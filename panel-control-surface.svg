<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="280mm" height="170mm"
     viewBox="0 0 280 170"
     style="background: transparent;">

  <defs>
    <pattern id="cgrid5" width="5" height="5" patternUnits="userSpaceOnUse">
      <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#AAAAAA" stroke-width="0.08" opacity="0.2"/>
    </pattern>
    <pattern id="cgrid25" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#AAAAAA" stroke-width="0.1" opacity="0.3"/>
    </pattern>
    <clipPath id="cpanelClip">
      <rect x="3" y="3" width="274" height="164" rx="3"/>
    </clipPath>
  </defs>

  <!-- ============================================ -->
  <!-- CONTROL SURFACE PANEL                        -->
  <!-- 280mm x 170mm  (~11" x 6.7")                -->
  <!-- Material: Smoked 3mm Acrylic                 -->
  <!-- LAYER: CUT (RED #FF0000)                     -->
  <!-- LAYER: ETCH-DEEP (BLUE #0000FF)              -->
  <!-- LAYER: ETCH-LIGHT (GREEN #00AA00)            -->
  <!-- ============================================ -->


  <!-- ========================================= -->
  <!-- === ETCH-LIGHT LAYER (GREEN) - Grids  === -->
  <!-- ========================================= -->
  <g id="ETCH-LIGHT" clip-path="url(#cpanelClip)">
    <rect x="3" y="3" width="274" height="164" fill="url(#cgrid5)"/>
    <rect x="3" y="3" width="274" height="164" fill="url(#cgrid25)"/>

    <!-- Sparse topographic contours — aurora-inspired -->
    <g opacity="0.08" fill="none" stroke="#00AA00" stroke-width="0.15">
      <ellipse cx="140" cy="95" rx="90" ry="35" transform="rotate(-3 140 95)"/>
      <ellipse cx="140" cy="95" rx="65" ry="25" transform="rotate(-3 140 95)"/>
      <ellipse cx="140" cy="95" rx="40" ry="15" transform="rotate(-3 140 95)"/>
    </g>
  </g>


  <!-- ========================================= -->
  <!-- === ETCH-DEEP LAYER (BLUE) - Graphics === -->
  <!-- ========================================= -->
  <g id="ETCH-DEEP" fill="#0000FF" stroke="none" font-family="'Courier New', monospace">

    <!-- ── HEADER ── -->
    <rect x="12" y="12" width="256" height="0.25"/>

    <text x="14" y="20" font-size="4" letter-spacing="0.8">ARC-2026-AI-___</text>
    <text x="14" y="26" font-size="2" letter-spacing="0.4" opacity="0.6">SPECIMEN: RESONANCE FIELD — TACTILE CONTROL ARRAY</text>

    <text x="266" y="20" font-size="2" letter-spacing="0.5" text-anchor="end" opacity="0.6">MAESTRA NETWORK</text>
    <text x="266" y="25" font-size="1.6" letter-spacing="0.3" text-anchor="end" opacity="0.4">NODE: AI-___ | PROTOCOL: UDP/OSC | CLASS: ΣΩ-ACTIVE</text>

    <rect x="12" y="30" width="256" height="0.15" opacity="0.5"/>


    <!-- ── RF SPECTRUM TRACE ── -->
    <!-- Contained in a defined band: y=38 to y=58 -->

    <!-- Axis lines -->
    <line x1="14" y1="38" x2="14" y2="58" stroke="#0000FF" stroke-width="0.1" opacity="0.3"/>
    <line x1="14" y1="58" x2="266" y2="58" stroke="#0000FF" stroke-width="0.1" opacity="0.3"/>

    <!-- Spectrum trace -->
    <g opacity="0.45" fill="none" stroke="#0000FF" stroke-width="0.2">
      <polyline points="14,55 18,54 22,52 24,48 26,53 30,54 34,53 36,49 38,44 40,50 44,54 48,53 50,50 52,46 54,42 56,48 58,54 62,53 66,54 68,51 70,47 72,54 76,53 78,50 80,54 84,53 86,51 88,45 90,38 92,46 94,53 98,54 100,52 102,54 106,53 108,50 110,54 114,53 116,48 118,54 122,53 124,52 126,46 128,40 130,47 132,53 136,54 140,53 142,51 144,54 148,53 150,49 152,54 156,53 158,52 160,54 164,53 166,51 168,47 170,42 172,49 174,54 178,53 180,54 184,53 186,50 188,54 192,53 194,52 196,48 198,44 200,36 202,44 204,52 208,54 210,53 212,54 216,53 218,50 220,54 224,53 226,51 228,54 232,53 234,48 236,52 238,54 242,53 244,52 246,54 250,53 252,50 254,46 256,51 258,54 262,53 266,54"/>
    </g>

    <!-- Noise floor -->
    <line x1="14" y1="55.5" x2="266" y2="55.5" stroke="#0000FF" stroke-width="0.08" opacity="0.15" stroke-dasharray="1,1"/>

    <!-- Frequency labels -->
    <text x="14" y="63" font-size="1.2" letter-spacing="0.2" opacity="0.35">0</text>
    <text x="76" y="63" font-size="1.2" letter-spacing="0.2" opacity="0.35">250 MHz</text>
    <text x="138" y="63" font-size="1.2" letter-spacing="0.2" opacity="0.35">500</text>
    <text x="200" y="63" font-size="1.2" letter-spacing="0.2" opacity="0.35">750</text>
    <text x="252" y="63" font-size="1.2" letter-spacing="0.2" opacity="0.35">1 GHz</text>

    <!-- dB scale on left -->
    <text x="11" y="40" font-size="1" letter-spacing="0.1" opacity="0.3" text-anchor="end">0</text>
    <text x="11" y="49" font-size="1" letter-spacing="0.1" opacity="0.3" text-anchor="end">-40</text>
    <text x="11" y="57" font-size="1" letter-spacing="0.1" opacity="0.3" text-anchor="end">-80</text>
    <text x="9" y="36" font-size="1" letter-spacing="0.1" opacity="0.25" text-anchor="end">dBm</text>


    <!-- ── KNOB ZONE ── -->
    <!-- 4 pots at y=100, spaced at x=50, x=120, x=190, x=260 (wider panel, more room) -->
    <!-- Reduced to single outer ring + major ticks only for clean look -->

    <!-- Thin separator above knob zone -->
    <rect x="12" y="70" width="256" height="0.1" opacity="0.25"/>
    <text x="14" y="75" font-size="1.3" letter-spacing="1.5" opacity="0.25">CONTROL INTERFACE</text>


    <!-- === KNOB 1: FREQ BAND === -->
    <g transform="translate(43, 100)">
      <!-- Single dial arc -->
      <circle cx="0" cy="0" r="18" fill="none" stroke="#0000FF" stroke-width="0.15" opacity="0.3"/>

      <!-- Major ticks only (11 positions, 270° sweep) -->
      <g fill="none" stroke="#0000FF" stroke-width="0.2" opacity="0.5">
        <line x1="-12.0" y1="12.0" x2="-14.1" y2="14.1"/>
        <line x1="-15.9" y1="5.4" x2="-18.0" y2="6.2"/>
        <line x1="-16.5" y1="-1.8" x2="-18.8" y2="-2.1"/>
        <line x1="-14.3" y1="-8.7" x2="-16.3" y2="-9.9"/>
        <line x1="-9.5" y1="-14.0" x2="-10.9" y2="-16.0"/>
        <line x1="-3.1" y1="-16.7" x2="-3.5" y2="-19.1"/>
        <line x1="4.0" y1="-16.3" x2="4.5" y2="-18.6"/>
        <line x1="10.2" y1="-13.0" x2="11.6" y2="-14.9"/>
        <line x1="14.6" y1="-7.6" x2="16.7" y2="-8.6"/>
        <line x1="16.4" y1="-0.6" x2="18.7" y2="-0.7"/>
        <line x1="12.0" y1="12.0" x2="14.1" y2="14.1"/>
      </g>

      <!-- Label -->
      <text x="0" y="27" font-size="2.8" letter-spacing="1.2" text-anchor="middle">FREQ BAND</text>
      <text x="0" y="32" font-size="1.4" letter-spacing="0.3" text-anchor="middle" opacity="0.4">RF SPECTRUM SELECT</text>

      <!-- Endpoint labels -->
      <text x="-17" y="19" font-size="1.3" opacity="0.35">LO</text>
      <text x="14" y="19" font-size="1.3" opacity="0.35">HI</text>
    </g>

    <!-- === KNOB 2: GAIN === -->
    <g transform="translate(108, 100)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#0000FF" stroke-width="0.15" opacity="0.3"/>

      <g fill="none" stroke="#0000FF" stroke-width="0.2" opacity="0.5">
        <line x1="-12.0" y1="12.0" x2="-14.1" y2="14.1"/>
        <line x1="-15.9" y1="5.4" x2="-18.0" y2="6.2"/>
        <line x1="-16.5" y1="-1.8" x2="-18.8" y2="-2.1"/>
        <line x1="-14.3" y1="-8.7" x2="-16.3" y2="-9.9"/>
        <line x1="-9.5" y1="-14.0" x2="-10.9" y2="-16.0"/>
        <line x1="-3.1" y1="-16.7" x2="-3.5" y2="-19.1"/>
        <line x1="4.0" y1="-16.3" x2="4.5" y2="-18.6"/>
        <line x1="10.2" y1="-13.0" x2="11.6" y2="-14.9"/>
        <line x1="14.6" y1="-7.6" x2="16.7" y2="-8.6"/>
        <line x1="16.4" y1="-0.6" x2="18.7" y2="-0.7"/>
        <line x1="12.0" y1="12.0" x2="14.1" y2="14.1"/>
      </g>

      <text x="0" y="27" font-size="2.8" letter-spacing="1.2" text-anchor="middle">GAIN</text>
      <text x="0" y="32" font-size="1.4" letter-spacing="0.3" text-anchor="middle" opacity="0.4">RF SENSITIVITY</text>

      <text x="-17" y="19" font-size="1.3" opacity="0.35">MIN</text>
      <text x="11" y="19" font-size="1.3" opacity="0.35">MAX</text>
    </g>

    <!-- === KNOB 3: DRIFT === -->
    <g transform="translate(173, 100)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#0000FF" stroke-width="0.15" opacity="0.3"/>

      <g fill="none" stroke="#0000FF" stroke-width="0.2" opacity="0.5">
        <line x1="-12.0" y1="12.0" x2="-14.1" y2="14.1"/>
        <line x1="-15.9" y1="5.4" x2="-18.0" y2="6.2"/>
        <line x1="-16.5" y1="-1.8" x2="-18.8" y2="-2.1"/>
        <line x1="-14.3" y1="-8.7" x2="-16.3" y2="-9.9"/>
        <line x1="-9.5" y1="-14.0" x2="-10.9" y2="-16.0"/>
        <line x1="-3.1" y1="-16.7" x2="-3.5" y2="-19.1"/>
        <line x1="4.0" y1="-16.3" x2="4.5" y2="-18.6"/>
        <line x1="10.2" y1="-13.0" x2="11.6" y2="-14.9"/>
        <line x1="14.6" y1="-7.6" x2="16.7" y2="-8.6"/>
        <line x1="16.4" y1="-0.6" x2="18.7" y2="-0.7"/>
        <line x1="12.0" y1="12.0" x2="14.1" y2="14.1"/>
      </g>

      <text x="0" y="27" font-size="2.8" letter-spacing="1.2" text-anchor="middle">DRIFT</text>
      <text x="0" y="32" font-size="1.4" letter-spacing="0.3" text-anchor="middle" opacity="0.4">AURORA VELOCITY</text>

      <text x="-19" y="19" font-size="1.3" opacity="0.35">SLOW</text>
      <text x="11" y="19" font-size="1.3" opacity="0.35">FAST</text>
    </g>

    <!-- === KNOB 4: BLEND === -->
    <g transform="translate(238, 100)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#0000FF" stroke-width="0.15" opacity="0.3"/>

      <g fill="none" stroke="#0000FF" stroke-width="0.2" opacity="0.5">
        <line x1="-12.0" y1="12.0" x2="-14.1" y2="14.1"/>
        <line x1="-15.9" y1="5.4" x2="-18.0" y2="6.2"/>
        <line x1="-16.5" y1="-1.8" x2="-18.8" y2="-2.1"/>
        <line x1="-14.3" y1="-8.7" x2="-16.3" y2="-9.9"/>
        <line x1="-9.5" y1="-14.0" x2="-10.9" y2="-16.0"/>
        <line x1="-3.1" y1="-16.7" x2="-3.5" y2="-19.1"/>
        <line x1="4.0" y1="-16.3" x2="4.5" y2="-18.6"/>
        <line x1="10.2" y1="-13.0" x2="11.6" y2="-14.9"/>
        <line x1="14.6" y1="-7.6" x2="16.7" y2="-8.6"/>
        <line x1="16.4" y1="-0.6" x2="18.7" y2="-0.7"/>
        <line x1="12.0" y1="12.0" x2="14.1" y2="14.1"/>
      </g>

      <text x="0" y="27" font-size="2.8" letter-spacing="1.2" text-anchor="middle">BLEND</text>
      <text x="0" y="32" font-size="1.4" letter-spacing="0.3" text-anchor="middle" opacity="0.4">AURORA ↔ RF</text>

      <text x="-17" y="19" font-size="1.3" opacity="0.35">AUR</text>
      <text x="12" y="19" font-size="1.3" opacity="0.35">RF</text>
    </g>


    <!-- ── SIGNAL FLOW (minimal dotted lines between knobs) ── -->
    <g fill="none" stroke="#0000FF" stroke-width="0.1" opacity="0.2" stroke-dasharray="1,2">
      <line x1="63" y1="100" x2="88" y2="100"/>
      <line x1="128" y1="100" x2="153" y2="100"/>
      <line x1="193" y1="100" x2="218" y2="100"/>
    </g>


    <!-- ── FOOTER ── -->
    <rect x="12" y="145" width="256" height="0.15" opacity="0.4"/>

    <!-- Minimal metadata -->
    <text x="14" y="152" font-size="1.6" letter-spacing="0.3" opacity="0.5">INPUTS: 4× ROTARY [10kΩ] | INTERFACE: ESP32 → UNREAL ENGINE | MATERIAL: 3mm SMOKED ACRYLIC</text>

    <!-- Scale ruler -->
    <line x1="14" y1="158" x2="114" y2="158" stroke="#0000FF" stroke-width="0.1" opacity="0.35"/>
    <line x1="14" y1="156.5" x2="14" y2="159.5" stroke="#0000FF" stroke-width="0.1" opacity="0.35"/>
    <line x1="64" y1="157" x2="64" y2="159" stroke="#0000FF" stroke-width="0.08" opacity="0.25"/>
    <line x1="114" y1="156.5" x2="114" y2="159.5" stroke="#0000FF" stroke-width="0.1" opacity="0.35"/>
    <text x="14" y="163" font-size="1.1" opacity="0.3">0</text>
    <text x="60" y="163" font-size="1.1" opacity="0.3">50</text>
    <text x="108" y="163" font-size="1.1" opacity="0.3">100mm</text>

    <!-- Sparse glyphs -->
    <text x="252" y="155" font-size="2" opacity="0.2">◈</text>
    <text x="260" y="155" font-size="2" opacity="0.2">◉</text>
    <text x="256" y="163" font-size="2" opacity="0.2">◎</text>

    <!-- Bottom rule -->
    <rect x="12" y="165" width="256" height="0.25"/>

    <!-- Corner registration marks -->
    <line x1="2" y1="8" x2="2" y2="2" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="2" y1="2" x2="8" y2="2" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="272" y1="2" x2="278" y2="2" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="278" y1="2" x2="278" y2="8" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="2" y1="162" x2="2" y2="168" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="2" y1="168" x2="8" y2="168" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="278" y1="162" x2="278" y2="168" stroke="#0000FF" stroke-width="0.12"/>
    <line x1="272" y1="168" x2="278" y2="168" stroke="#0000FF" stroke-width="0.12"/>

  </g>


  <!-- ========================================= -->
  <!-- === CUT LAYER (RED) - Through cuts    === -->
  <!-- ========================================= -->
  <g id="CUT" fill="none" stroke="#FF0000" stroke-width="0.1">

    <!-- Outer panel boundary -->
    <rect x="0" y="0" width="280" height="170" rx="5" ry="5"/>

    <!-- Corner mounting holes (M4) -->
    <circle cx="10" cy="10" r="2.1"/>
    <circle cx="270" cy="10" r="2.1"/>
    <circle cx="10" cy="160" r="2.1"/>
    <circle cx="270" cy="160" r="2.1"/>

    <!-- Mid-edge mounting holes -->
    <circle cx="140" cy="10" r="2.1"/>
    <circle cx="140" cy="160" r="2.1"/>

    <!-- Potentiometer shaft holes (7mm = r3.5 for 16mm pots) -->
    <circle cx="43" cy="100" r="3.5"/>
    <circle cx="108" cy="100" r="3.5"/>
    <circle cx="173" cy="100" r="3.5"/>
    <circle cx="238" cy="100" r="3.5"/>

    <!-- Anti-rotation tab slots -->
    <rect x="40.5" y="90" width="5" height="2" rx="0.5"/>
    <rect x="105.5" y="90" width="5" height="2" rx="0.5"/>
    <rect x="170.5" y="90" width="5" height="2" rx="0.5"/>
    <rect x="235.5" y="90" width="5" height="2" rx="0.5"/>

    <!-- Cable routing slot (bottom center) -->
    <rect x="125" y="164" width="30" height="6" rx="2"/>

  </g>

</svg>